name: Release
on:
  push:
    tags:
      - 'v*'
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  # ── Job 1: Generate changelog and create the GitHub release ─────────────────
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for git log
      - name: Generate changelog from commits
        id: changelog
        run: |
          CURRENT_TAG="${{ github.ref_name }}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${CURRENT_TAG}$" | head -1 || echo "")
          {
            echo 'body<<EOF'
            if [ -n "$PREV_TAG" ]; then
              echo "## What's changed since \`${PREV_TAG}\`"
              echo ""
              git log --pretty=format:"- %s" "${PREV_TAG}..HEAD" | grep -v "^- $" || true
            else
              echo "## Initial release"
              echo ""
              git log --pretty=format:"- %s" | grep -v "^- $" || true
            fi
            echo ""
            echo "---"
            echo ""
            echo "### macOS — Gatekeeper warning"
            echo "If macOS blocks the app, run once in Terminal after installing:"
            echo '```sh'
            echo 'xattr -cr /Applications/DB\ Connect.app'
            echo '```'
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
      - name: Create GitHub release
        id: create
        uses: actions/github-script@v7
        env:
          RELEASE_BODY: ${{ steps.changelog.outputs.body }}
          RELEASE_TAG: ${{ github.ref_name }}
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: process.env.RELEASE_TAG,
              name: `DB Connect ${process.env.RELEASE_TAG}`,
              body: process.env.RELEASE_BODY,
              draft: false,
              prerelease: false,
            });
            return data.id;
          result-encoding: string
  # ── Job 2: Update CHANGELOG.md and commit it back to main ──────────────────
  update-changelog:
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use a PAT or the default GITHUB_TOKEN; push is allowed because
          # we set `contents: write` above.
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build CHANGELOG entry
        id: entry
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          DATE=$(date -u +%Y-%m-%d)
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -1 || echo "")
          {
            echo "entry<<EOF"
            echo "## [${VERSION}] — ${DATE}"
            echo ""
            if [ -n "$PREV_TAG" ]; then
              git log --pretty=format:"- %s" "${PREV_TAG}..HEAD" | grep -v "^- $" || true
            else
              git log --pretty=format:"- %s" | grep -v "^- $" || true
            fi
            echo ""
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Prepend entry to CHANGELOG.md
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          DATE=$(date -u +%Y-%m-%d)
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -1 || echo "")
          HEADER="# Changelog\n\nAll notable changes to DB Connect are documented here.\n\n"
          # Build the new entry block
          {
            echo "## [${VERSION}] — ${DATE}"
            echo ""
            if [ -n "$PREV_TAG" ]; then
              git log --pretty=format:"- %s" "${PREV_TAG}..HEAD" | grep -v "^- $" || true
            else
              git log --pretty=format:"- %s" | grep -v "^- $" || true
            fi
            echo ""
          } > /tmp/new_entry.md
          if [ -f CHANGELOG.md ]; then
            # Strip existing header lines so we don't duplicate them
            BODY=$(sed '/^# Changelog/,/^$/d' CHANGELOG.md | sed '1{/^$/d}')
            printf "%b" "$HEADER" > CHANGELOG.md
            cat /tmp/new_entry.md >> CHANGELOG.md
            echo "$BODY" >> CHANGELOG.md
          else
            printf "%b" "$HEADER" > CHANGELOG.md
            cat /tmp/new_entry.md >> CHANGELOG.md
          fi
      - name: Commit and push CHANGELOG.md
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No changes to CHANGELOG.md — skipping commit."
          else
            git commit -m "chore: update CHANGELOG.md for ${{ github.ref_name }}"
            git push origin HEAD:${{ github.event.repository.default_branch }}
          fi
  # ── Job 3: Build for each platform and upload to the release ────────────────
  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: windows-latest
            args: ''
          - platform: ubuntu-22.04
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config
      - name: Install frontend dependencies
        run: npm ci
      - name: Build and upload assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          includeUpdaterJson: false
          args: ${{ matrix.args }}
      - name: Upload .sig files to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          find src-tauri/target -path "*/bundle/*" -name "*.sig" | while IFS= read -r f; do
            echo "Uploading: $(basename "$f")"
            gh release upload "${{ github.ref_name }}" "$f" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          done
  # ── Job 3: Assemble latest.json from all platform .sig files ────────────────
  publish-updater:
    needs: [create-release, build]
    if: always() && needs.create-release.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate and upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          # Download only .sig files from the release
          mkdir -p /tmp/sigs
          gh release download "$TAG" \
            --dir /tmp/sigs \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "*.sig" || true
          # Fetch asset metadata and release info
          ASSETS=$(gh api "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID/assets" --paginate)
          RELEASE=$(gh api "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID")
          PUB_DATE=$(echo "$RELEASE" | jq -r '.published_at')
          NOTES=$(echo "$RELEASE" | jq -r '.body // ""')
          PLATFORMS="{}"
          for SIG_FILE in /tmp/sigs/*.sig; do
            [ -f "$SIG_FILE" ] || continue
            BASENAME=$(basename "$SIG_FILE")
            ARCHIVE_NAME="${BASENAME%.sig}"
            PLATFORM=""
            if [[ "$BASENAME" == *aarch64.app.tar.gz.sig ]]; then
              PLATFORM="darwin-aarch64"
            elif [[ "$BASENAME" == *x86_64.app.tar.gz.sig ]]; then
              PLATFORM="darwin-x86_64"
            elif [[ "$BASENAME" == *.AppImage.tar.gz.sig ]]; then
              PLATFORM="linux-x86_64"
            elif [[ "$BASENAME" == *x64-setup.exe.sig || "$BASENAME" == *x64_en-US.msi.zip.sig ]]; then
              PLATFORM="windows-x86_64"
            else
              echo "Skipping unrecognised sig: $BASENAME"
              continue
            fi
            SIG=$(tr -d '\n' < "$SIG_FILE")
            URL=$(echo "$ASSETS" | jq -r --arg n "$ARCHIVE_NAME" \
              '.[] | select(.name == $n) | .browser_download_url')
            if [ -z "$URL" ]; then
              echo "Warning: no archive URL found for $ARCHIVE_NAME"
              continue
            fi
            echo "  ✓ $PLATFORM → $ARCHIVE_NAME"
            PLATFORMS=$(echo "$PLATFORMS" | jq \
              --arg p "$PLATFORM" --arg s "$SIG" --arg u "$URL" \
              '.[$p] = {signature: $s, url: $u}')
          done
          jq -n \
            --arg version "$VERSION" \
            --arg notes "$NOTES" \
            --arg pub_date "$PUB_DATE" \
            --argjson platforms "$PLATFORMS" \
            '{version: $version, notes: $notes, pub_date: $pub_date, platforms: $platforms}' \
            > latest.json
          echo "=== latest.json ==="
          cat latest.json
          gh release upload "$TAG" latest.json \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
