name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ── Job 1: Generate changelog and create the GitHub release ─────────────────
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create.outputs.result }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for git log

      - name: Generate changelog from commits
        id: changelog
        run: |
          CURRENT_TAG="${{ github.ref_name }}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${CURRENT_TAG}$" | head -1 || echo "")

          {
            echo 'body<<EOF'

            if [ -n "$PREV_TAG" ]; then
              echo "## What's changed since \`${PREV_TAG}\`"
              echo ""
              git log --pretty=format:"- %s" "${PREV_TAG}..HEAD" | grep -v "^- $"
            else
              echo "## Initial release"
              echo ""
              git log --pretty=format:"- %s" | grep -v "^- $"
            fi

            echo ""
            echo "---"
            echo ""
            echo "### macOS — Gatekeeper warning"
            echo "If macOS blocks the app, run once in Terminal after installing:"
            echo '```sh'
            echo 'xattr -cr /Applications/DB\ Connect.app'
            echo '```'

            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        id: create
        uses: actions/github-script@v7
        env:
          RELEASE_BODY: ${{ steps.changelog.outputs.body }}
          RELEASE_TAG: ${{ github.ref_name }}
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: process.env.RELEASE_TAG,
              name: `DB Connect ${process.env.RELEASE_TAG}`,
              body: process.env.RELEASE_BODY,
              draft: false,
              prerelease: false,
            });
            return data.id;
          result-encoding: string

  # ── Job 2: Build for each platform and upload to the release ────────────────
  build:
    needs: create-release
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: windows-latest
            args: ''
          - platform: ubuntu-22.04
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          includeUpdaterJson: true
          args: ${{ matrix.args }}
