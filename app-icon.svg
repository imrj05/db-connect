<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dbGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="db2Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="linkGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bgGrad)"/>

  <!-- Left database cylinder -->
  <!-- Top ellipse cap -->
  <ellipse cx="168" cy="168" rx="72" ry="22" fill="url(#db2Grad)" filter="url(#shadow)"/>
  <!-- Cylinder body -->
  <rect x="96" y="168" width="144" height="110" fill="url(#dbGrad)"/>
  <!-- Middle stripe lines -->
  <line x1="96" y1="200" x2="240" y2="200" stroke="#60a5fa" stroke-width="1.5" opacity="0.4"/>
  <line x1="96" y1="220" x2="240" y2="220" stroke="#60a5fa" stroke-width="1.5" opacity="0.4"/>
  <!-- Bottom ellipse cap -->
  <ellipse cx="168" cy="278" rx="72" ry="22" fill="#1d4ed8"/>
  <!-- Bottom highlight -->
  <ellipse cx="168" cy="278" rx="72" ry="22" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.6"/>

  <!-- Right database cylinder -->
  <ellipse cx="344" cy="228" rx="72" ry="22" fill="url(#db2Grad)" filter="url(#shadow)"/>
  <rect x="272" y="228" width="144" height="110" fill="url(#dbGrad)"/>
  <line x1="272" y1="260" x2="416" y2="260" stroke="#60a5fa" stroke-width="1.5" opacity="0.4"/>
  <line x1="272" y1="280" x2="416" y2="280" stroke="#60a5fa" stroke-width="1.5" opacity="0.4"/>
  <ellipse cx="344" cy="338" rx="72" ry="22" fill="#1d4ed8"/>
  <ellipse cx="344" cy="338" rx="72" ry="22" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.6"/>

  <!-- Connection line with arrow -->
  <path d="M 240 223 Q 256 210 272 253" stroke="url(#linkGrad)" stroke-width="6" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Arrow dots -->
  <circle cx="240" cy="223" r="7" fill="#38bdf8" filter="url(#glow)"/>
  <circle cx="272" cy="253" r="7" fill="#818cf8" filter="url(#glow)"/>

  <!-- Gloss overlay on background -->
  <ellipse cx="256" cy="100" rx="180" ry="60" fill="white" opacity="0.03"/>
</svg>
